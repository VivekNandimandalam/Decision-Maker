name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  EB_ENVIRONMENT: production
  EB_APPLICATION: decisionmaker-backend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: polling_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/polling_test
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/polling_test
        run: |
          cd backend
          python manage.py test polls

      - name: Check for migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

      - name: Run linting
        run: |
          pip install flake8 black isort
          flake8 backend/polls --max-line-length=100 --exclude=migrations || true
          black --check backend/polls || true
          isort --check-only backend || true

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install bandit safety pip-audit

      - name: Bandit Security Scan
        run: |
          cd backend
          bandit -r polls --skip B101,B601 || true

      - name: Safety Check
        run: |
          cd backend
          safety check --json || true

      - name: Pip Audit
        run: |
          cd backend
          pip-audit || true

  deploy:
    needs: [test-backend, test-frontend, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ec2-user
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Write SSH key to file
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/decision-maker-key.pem
          chmod 600 ~/.ssh/decision-maker-key.pem
          
          # Add EC2 to known_hosts
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Fix ownership before rsync
          ssh -i ~/.ssh/decision-maker-key.pem $EC2_USER@$EC2_HOST \
            "sudo chown -R ec2-user:ec2-user /home/ec2-user/Decision-Maker 2>/dev/null || true"
          
          # Clean venv on remote to avoid permission conflicts
          ssh -i ~/.ssh/decision-maker-key.pem $EC2_USER@$EC2_HOST \
            "rm -rf /home/ec2-user/Decision-Maker/backend/venv 2>/dev/null || true"
          
          # Sync code to EC2
          rsync -avz \
            -e "ssh -i ~/.ssh/decision-maker-key.pem" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='backend/venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='*.pem' \
            . $EC2_USER@$EC2_HOST:/home/ec2-user/Decision-Maker/
          
          # Deploy on EC2
          ssh -i ~/.ssh/decision-maker-key.pem $EC2_USER@$EC2_HOST << 'DEPLOY'
          set -e
          cd /home/ec2-user/Decision-Maker
          
          # Backend
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          python3 manage.py migrate
          deactivate
          
          # Frontend  
          cd ../frontend
          npm ci
          npm run build
          
          # Restart services
          sudo systemctl restart gunicorn
          sudo systemctl restart nginx
          
          echo "✓ Deployment successful!"
          DEPLOY






