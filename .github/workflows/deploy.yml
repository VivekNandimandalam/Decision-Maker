name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  EB_ENVIRONMENT: production
  EB_APPLICATION: decisionmaker-backend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: polling_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/polling_test
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/polling_test
        run: |
          cd backend
          python manage.py test polls

      - name: Check for migrations
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

      - name: Run linting
        run: |
          pip install flake8 black isort
          flake8 backend/polls --max-line-length=100 --exclude=migrations || true
          black --check backend/polls || true
          isort --check-only backend || true

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install bandit safety pip-audit

      - name: Bandit Security Scan
        run: |
          cd backend
          bandit -r polls --skip B101,B601 || true

      - name: Safety Check
        run: |
          cd backend
          safety check --json || true

      - name: Pip Audit
        run: |
          cd backend
          pip-audit || true

  deploy:
    needs: [test-backend, test-frontend, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ec2-user
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_KEY" ]; then
            echo "Missing one or more required secrets: EC2_HOST, EC2_SSH_KEY"
            exit 1
          fi

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/decision-maker-key.pem
          chmod 600 ~/.ssh/decision-maker-key.pem

          # Trust host key for non-interactive SSH
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy on EC2 host
          ssh -i ~/.ssh/decision-maker-key.pem $EC2_USER@$EC2_HOST << 'DEPLOY'
          set -e
          cd /home/ec2-user/Decision-Maker

          # Pull latest changes from main branch
          if [ -n "$(git status --porcelain)" ]; then
            git stash push --include-untracked -m "gha-autostash-$(date +%s)" || true
          fi
          git pull origin main

          # Backend
          cd backend
          if [ ! -f venv/bin/activate ]; then
            rm -rf venv
            if command -v python3.12 >/dev/null 2>&1; then
              python3.12 -m venv venv
            elif command -v python3 >/dev/null 2>&1; then
              python3 -m venv venv
            else
              echo "Python 3 not found on EC2 host"
              exit 1
            fi
          fi

          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python manage.py migrate --noinput
          if python -c "import os,sys,django; os.environ.setdefault('DJANGO_SETTINGS_MODULE','backend.settings'); django.setup(); from django.conf import settings; sys.exit(0 if getattr(settings,'STATIC_ROOT',None) else 1)"
          then
            python manage.py collectstatic --noinput
          else
            echo "Skipping collectstatic: STATIC_ROOT is not configured for current settings"
          fi
          deactivate

          # Frontend
          cd ../frontend
          npm ci
          unset VITE_API_BASE_URL
          unset VITE_WS_BASE_URL
          npm run build

          # Restart services
          sudo systemctl restart gunicorn
          sudo systemctl restart nginx

          echo "✓ Deployment successful!"
          DEPLOY






