version: '3.8'

services:
  # PostgreSQL Database (Production-like)
  db:
    image: postgres:14-alpine
    container_name: polling-db
    environment:
      POSTGRES_DB: polling_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: your-secure-password-here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build: ./backend
    container_name: polling-backend
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: "your-secret-key-here"
      DATABASE_URL: "postgresql://admin:your-secure-password-here@db:5432/polling_db"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:5173"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload"

  # React Frontend (Development)
  frontend:
    build: ./frontend
    container_name: polling-frontend
    environment:
      VITE_API_BASE_URL: "http://backend:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  # Nginx Reverse Proxy (Optional - for production simulation)
  nginx:
    image: nginx:alpine
    container_name: polling-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
